project:
  type: book
  output-dir: _book

book:
  title: "חשבון אינפיניטסימלי 1 להנדסה"
  subtitle: "טיוטה — מבוססת על מחברת ההרצאות, כתיב גולמי לעריכה"
  author: "יובל חצ׳טריאן-רזיאל"
  output-file: "Book_Draft"
  search: true
  reader-mode: true
  chapters:
    - index.qmd
    - part: part-1-foundations.qmd
      chapters:
        - 01-logic.qmd
        - 02-sets.qmd
        - 03-number-systems.qmd
        - 04-abs-value.qmd
        - 05-induction.qmd
    - part: "חלק 2: סדרות"
      chapters:
        - 06-sequences.qmd
    - part: "חלק 3: מבוא לפונקציות"
      chapters:
        - 07-functions-intro.qmd
    - part: "חלק 4: גבולות של פונקציות"
      chapters:
        - 08-function-limits.qmd
    - part: "חלק 5: רציפות"
      chapters:
        - 09-continuity.qmd
    - part: "חלק 6: הנגזרת"
      chapters:
        - 10-derivative.qmd
    - part: "חלק 7: שימושים של הנגזרת"
      chapters:
        - 11-derivative-applications.qmd
    - part: "חלק 8: נגזרות מסדר גבוה וחקירת פונקציות"
      chapters:
        - 12-higher-derivatives.qmd
    - part: "חלק 9: האינטגרל הלא-מסוים"
      chapters:
        - 13-indefinite-integral.qmd
    - part: "חלק 10: האינטגרל המסוים"
      chapters:
        - 14-definite-integral.qmd
    - part: "חלק 11: האינטגרל המוכלל"
      chapters:
        - 15-improper-integral.qmd

lang: he
dir: rtl
number-sections: true
number-depth: 1

crossref:
  chapters: true
  def-title: "הגדרה"
  exm-title: "דוגמה"
  thm-title: "משפט"
  prp-title: "טענה"

language:
  crossref-prp-prefix: "טענה"

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-title: "תוכן העניינים"
    toc-expand: true
    code-fold: true
    include-in-header: _styles.html
  pdf:
    pdf-engine: xelatex
    keep-tex: true
    mainfont: Arial
    sansfont: Arial
    monofont: "Courier New"
    mathfont: "XITSMath-Regular.otf"
    code-overflow: wrap
    geometry:
      - margin=2.5cm

jupyter: python3
