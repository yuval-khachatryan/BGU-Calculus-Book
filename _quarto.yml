project:
  type: book
  output-dir: _book

book:
  title: "חשבון דיפרנציאלי ואינטגרלי 1 להנדסה"
  subtitle: "טיוטה — מבוססת על מחברת ההרצאות, כתיב גולמי לעריכה"
  author: "יובל חצ׳טריאן-רזיאל"
  output-file: "Book_Draft"
  search: true
  reader-mode: true
  chapters:
    - index.qmd
    - part: part-1-foundations.qmd
      chapters:
        - 01-logic.qmd
        - 02-sets.qmd
        - 03-number-systems.qmd
        - 04-abs-value.qmd
        - 05-induction.qmd
    - part: "חלק 2: סדרות"
      chapters:
        - 06-sequences-intro.qmd
        - 07-sequences-limit.qmd
        - 08-sequences-properties.qmd
        - 09-sequences-monotone.qmd
        - 10-sequences-infinity.qmd
        - 11-sequences-subsequences.qmd
    - part: "חלק 3: מבוא לפונקציות"
      chapters:
        - 12-functions-intro.qmd
    - part: "חלק 4: גבולות של פונקציות"
      chapters:
        - 13-function-limits.qmd
    - part: "חלק 5: רציפות"
      chapters:
        - 14-continuity.qmd
    - part: "חלק 6: הנגזרת"
      chapters:
        - 15-derivative.qmd
    - part: "חלק 7: שימושים של הנגזרת"
      chapters:
        - 16-derivative-applications.qmd
    - part: "חלק 8: נגזרות מסדר גבוה וחקירת פונקציות"
      chapters:
        - 17-higher-derivatives.qmd
    - part: "חלק 9: האינטגרל הלא-מסוים"
      chapters:
        - 18-indefinite-integral.qmd
    - part: "חלק 10: האינטגרל המסוים"
      chapters:
        - 19-definite-integral.qmd
    - part: "חלק 11: האינטגרל המוכלל"
      chapters:
        - 20-improper-integral.qmd

lang: he
dir: rtl
number-sections: true
number-depth: 2

crossref:
  chapters: true
  def-title: "הגדרה"
  exm-title: "דוגמה"
  thm-title: "משפט"
  prp-title: "טענה"

language:
  crossref-prp-prefix: "טענה"

filters:
  - theorem-numbering.lua
  - quarto

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-title: "תוכן העניינים"
    toc-expand: true
    code-fold: true
    include-in-header: _styles.html
  pdf:
    pdf-engine: xelatex
    keep-tex: true
    include-in-header:
      text: |
        % Quarto renders callouts as an `enhanced` tcolorbox, which is broken in
        % RTL (bidi): a diagonal line appears and every page after it shifts left.
        % Render callout content as a plain block instead. (HTML is unaffected.)
        \AtBeginDocument{\renewenvironment{tcolorbox}[1][]{\par\smallskip}{\par\smallskip}}
        % In RTL (babel bidi=basic), hyperref colored links bleed their blue color
        % and clickable box across the whole line. Turn link coloring off in the PDF
        % (links still work/navigate; they just render as normal black text).
        \AtBeginDocument{\hypersetup{hidelinks}}
        % optional-reading blocks: a coloured label, deliberately NOT a framed box
        % (framed/tcolorbox environments re-trigger the RTL breakage above).
        \definecolor{optionalaccent}{HTML}{9A7B1F}
        \newenvironment{optionalbox}{\par\medskip\noindent{\color{optionalaccent}\rule{\linewidth}{1.2pt}}\par\smallskip\noindent{\bfseries\color{optionalaccent}קריאת רשות}\par\smallskip}{\par\smallskip\noindent{\color{optionalaccent}\rule{\linewidth}{1.2pt}}\par\medskip}
    mainfont: Arial
    sansfont: Arial
    monofont: "Courier New"
    mathfont: "XITSMath-Regular.otf"
    code-overflow: wrap
    geometry:
      - margin=2.5cm

jupyter: python3
